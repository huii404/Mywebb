<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><b>Myweb</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="article.html">Bài viết</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="merories.html">Memory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" id="app">
        <div class="row">
            <div class="col-lg-3">
                <label for="" class="mt-3"><b>Danh mục</b></label>
                <select name="" id="" class="form-control text-center ">
                    <option value="">Chọn chủ đề</option>
                    <div v-for="(value,index) in baiviet">
                        <option value="">{{value.category}}</option>
                    </div>
                </select>

                <label class="mt-3" for=""><b>Tìm kiếm</b></label>
                <input type="text" class="form-control" placeholder="Nhập từ khóa">

                <label for="" class="mt-3"><b>Lọc ngày</b></label>
                <select name="" id="" class="form-control">
                    <option value="0">Chọn kiểu</option>
                    <option value="1">Ngày cũ đến mới</option>
                    <option value="2">Ngày mới đến cũ</option>
                </select>
                <button class="btn btn-outline-primary mt-3">Xóa bộ lọc</button><br>
                
            </div>



            <div class="col-lg-8">
                <div class="row">
                    <b class="mt-3 text-center">Tin Tức</b>
                    <div v-for="(value, index) in baiviet" :key="value.id" class="col-lg-3">
                        <div class="card mt-3 p-2 text-center border-danger">
                            <b><i>{{ value.name }}</i></b>
                            <p class="mb-0">{{ value.date }}</p>
                            <span class="badge rounded-pill bg-primary"><i class="fa-solid fa-clock text-dark"></i>{{value.category}}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
<script>
    new Vue({
        el: "#app",
        data: {
            baiviet: [
                {
                    id: 1,
                    name: "Khám phá trí tuệ nhân tạo (AI) năm 2024",
                    date: "11/11/2024",
                    category: "Khoa học",
                    image: "https://picsum.photos/id/1/200/120",
                    content: "Trí tuệ nhân tạo đang thay đổi cách chúng ta làm việc và sáng tạo mỗi ngày..."
                },
                {
                    id: 2,
                    name: "Bootstrap 5 và những tính năng mới nhất",
                    date: "12/11/2024",
                    category: "Lập trình",
                    image: "https://picsum.photos/id/2/200/120",
                    content: "Thiết kế web nhanh hơn và dễ dàng hơn với hệ thống Grid và Utilities mới của Bootstrap."
                },
                {
                    id: 3,
                    name: "Tại sao nên học VueJS vào thời điểm này?",
                    date: "13/11/2024",
                    category: "Công nghệ",
                    image: "https://picsum.photos/id/3/200/120",
                    content: "VueJS vẫn giữ được vị thế nhờ sự đơn giản, hiệu năng cao và cộng đồng hỗ trợ mạnh mẽ."
                },
                {
                    id: 4,
                    name: "Top 5 xu hướng du lịch năm 2026",
                    date: "14/11/2024",
                    category: "Giải trí",
                    image: "https://picsum.photos/id/4/200/120",
                    content: "Du lịch bền vững và trải nghiệm văn hóa địa phương đang lên ngôi trong giới trẻ."
                },
                {
                    id: 5,
                    name: "Cách tối ưu hóa hiệu suất website",
                    date: "15/11/2024",
                    category: "Kỹ thuật",
                    image: "https://picsum.photos/id/5/200/120",
                    content: "Tốc độ tải trang là yếu tố quan trọng để giữ chân người dùng và cải thiện SEO."
                }
            ]
        },

        methods: {

        }
    })
</script>

</html>
