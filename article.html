<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><b>Myweb</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="article.html">Article</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="review.html">Review</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" id="app">
        <div class="row">
            <div class="col-lg-2">
                <label for="" class="mt-4"><b>Danh mục</b></label>
                <select v-model="tu_khoa" class="form-control text-center">
                    <option value="">Chọn chủ đề</option>
                    <option v-for="(cat, index) in danh_muc_duy_nhat" :key="index" :value="cat">
                        {{ cat }}
                    </option>
                </select>

                <label class="mt-3" for=""><b>Tìm kiếm</b></label>
                <input v-model="tu_khoa" type="text" class="form-control" placeholder="Nhập từ khóa">

                <label for="" class="mt-3"><b>Lọc ngày</b></label>
                <select v-model="kieu_sap_xep" name="" id="" class="form-control">
                    <option value="0">Chọn kiểu</option>
                    <option value="1">Ngày cũ đến mới</option>
                    <option value="2">Ngày mới đến cũ</option>
                </select>
                <button @click="tu_khoa = ''; kieu_sap_xep = '0'" class="btn btn-outline-primary mt-3">Xóa bộ
                    lọc</button>

            </div>



            <div class="col-lg-10">
                <div class="row g-4">
                    <div v-for="(value, index) in loc_danhmuc()" :key="value.id" class="col-lg-3">
                        <div class="card p-2 text-center border-danger shadow  mt-5 h-100">
                            <b><i>{{ value.name }}</i></b>
                            <div class="d-flex mt-3">
                                <p class="mb-0">{{ value.date }}</p>
                                <span class="badge bg-primary ms-auto rounded-5 mt-1">{{value.category}}</span>

                            </div>
                            <button @click="xemChiTiet(value)" class="btn btn-outline-success ms-3 mt-2">Open</button>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
<script>
    new Vue({
        el: "#app",
        data: {
            tu_khoa: "",
            kieu_sap_xep: "0",
            list: [],
            baiviet: DANH_SACH_BAI_VIET,
        },

        methods: {
            DieuKien(data) {
                let tukhoa = this.tu_khoa.toLowerCase().trim();
                let ten = (data.name || "").toLowerCase();
                let danhmuc = (data.category || "").toLowerCase();
                return ten.includes(tukhoa) || danhmuc.includes(tukhoa);
            },
            loc_time(danh_sach_da_loc) {
                // Tạo bản sao để không làm hỏng mảng gốc
                let ket_qua = [...danh_sach_da_loc];

                if (this.kieu_sap_xep !== "0") {
                    ket_qua.sort((a, b) => {
                        let dateA = new Date(a.date.split('/').reverse().join('-'));
                        let dateB = new Date(b.date.split('/').reverse().join('-'));

                        return this.kieu_sap_xep === "1" ? dateA - dateB : dateB - dateA;
                    });
                }
                return ket_qua;
            },

            loc_danhmuc() {
                let ds = this.baiviet.filter(this.DieuKien);
                return this.loc_time(ds);
            },
            xemChiTiet(item) {
                //link = id của mảng
                window.location.href = `detail.html?id=${item.id}`;
            }

        },
        computed: {
            // Tạo danh sách danh mục không trùng lặp
            danh_muc_duy_nhat() {
                //  Lấy ra tất cả category từ mảng baiviet
                let tat_ca_danh_muc = this.baiviet.map(item => item.category);

                // Dùng Set để lọc trùng và chuyển ngược lại thành mảng
                return [...new Set(tat_ca_danh_muc)];
            },
        }
    })
</script>

</html>
