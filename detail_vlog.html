<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><b>Myweb</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="article.html">Article</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="vlog.html">Vlog</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="tool.html">Tool</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" id="app">
        <div class="row">
            <div class="col-lg-12 col-md-12">
                <h3><b class="mt-2 text-primary">{{item.name}}</b></h3>
                <div class="d-flex align-items-center">
                    <p class="mb-0 me-2 small">{{item.date}}</p>
                    <span class="badge bg-primary rounded-pill ms-auto" style="font-size: 1rem;">
                        {{item.category}}
                    </span>
                </div>
                <button class="btn btn-outline-primary mt-2 rounded-5"><a href="vlog.html"><i
                            class="fa-solid fa-arrow-left"></i> Back</a></button>
                <hr>
                <!-- vì vuejs không cho html trong mảng DANH_SACH_BAI_VIET nên dùng v-html="" để đọc -->
                <p class="mt-3" v-html="item.content"></p>
            </div>
        </div>
    </div>
<script src="vlog_data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
<script>
    new Vue({
        el:"#app",
        data:{
            item:{}
        },
        created() {
            const url=new URLSearchParams(window.location.search);
            const id=url.get("id");

            if(id){
                const baivietchitiet=Data_vlog.find(x=>x.id==id);
                if(baivietchitiet){
                    this.item=baivietchitiet;
                }else{
                    alert("Không tìm thấy thông tin bài viết trong kho dữ liệu!");
                    window.location.href="vlog.html";
                }
            }else{
                window.location.href="vlog.html";
            }
        },
    })
</script>
</html>
