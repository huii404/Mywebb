<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        /* Thêm một chút CSS để hover có hiệu ứng */
        .hobby-badge {
            transition: all 0.3s ease;
            cursor: default;
        }

        .hobby-badge:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><b>Myweb</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="article.html">Article</a></li>
                    <a class="nav-link active" aria-current="page" href="review.html">Review</a>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5" id="app">
        <div class="row">
            <h3 class="text-center mt-4"><b>Liên hệ</b></h3>
            <hr class="mt-3">

            <div class="col-lg-4">
                <div class="card text-center mt-2 shadow-sm py-3">
                    <i class="fa-solid fa-envelope fa-2x text-primary mb-2"></i>
                    <b>hcao84539@gmail.com</b>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card text-center mt-2 shadow-sm py-3">
                    <i class="fa-brands fa-github fa-2x mb-2"></i>
                    <b>Huii404</b>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card text-center mt-2 shadow-sm py-3">
                    <i class="fa-brands fa-tiktok fa-2x mb-2"></i>
                    <b>Huii404</b>
                </div>
            </div>

            <hr class="mt-5 mb-4">

            <div class="col-lg-6">
                <h4 class="text-center mb-4"><b>Kĩ năng</b></h4>
                <div class="card shadow-sm p-4 border-1">
                    <div v-for="(skill, index) in skillsList" :key="index" class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="fw-bold"><i :class="skill.icon" class="me-2 text-secondary"></i>{{ skill.name
                                }}</span>
                            <span class="text-muted">{{ skill.percent }}%</span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar bg-primary" role="progressbar"
                                :style="{ width: skill.percent + '%' }" :aria-valuenow="skill.percent" aria-valuemin="0"
                                aria-valuemax="100">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 mt-4 mt-lg-0">
                <h4 class="text-center mb-4"><b>Sở thích</b></h4>
                <div class="card shadow-sm p-4 border-1 h-90 d-flex">
                    <div class="d-flex flex-wrap gap-2">
                        <span v-for="(hobby, index) in hobbiesList" :key="index"
                            class="badge rounded-pill text-bg-light border px-3 py-2 fs-6 hobby-badge text-dark">
                            <i :class="hobby.icon" class="me-1 text-primary"></i> {{ hobby.name }}
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        new Vue({
            el: "#app",
            data: {
                skillsList: [
                    { name: 'C++', percent: 40, icon: 'fa-solid fa-code' },
                    { name: 'C# / Java', percent: 20, icon: 'fa-brands fa-java' },
                    { name: 'Python', percent: 5, icon: 'fa-brands fa-python' },
                    { name: 'VueJS & Bootstrap', percent: 30, icon: 'fa-brands fa-vuejs' },
                ],
                
                hobbiesList: [
                    { name: 'Tập Gym', icon: 'fa-solid fa-dumbbell' },
                    { name: 'Chụp ảnh', icon: 'fa-solid fa-camera' },
                    { name: 'Đạp xe', icon: 'fa-solid fa-bicycle' },
                    { name: 'Phá máy', icon: 'fa-solid fa-microchip' }, // Hoặc 'fa-solid fa-screwdriver-wrench' cũng rất hợp với "phá máy"
                    { name: 'Trekking', icon: 'fa-solid fa-person-hiking' }, // Icon người leo núi
                    { name: 'Chill', icon: 'fa-solid fa-mug-hot' } // Icon tách cà phê/trà nóng cho cảm giác chill
                ]
            }
        })
    </script>
</body>

</html>
