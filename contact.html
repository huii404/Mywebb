<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><b>Myweb</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="article.html">Article</a></li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="vlog.html">Vlog</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="tool.html">Tool</a>
                    </li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" id="app">
    <div class="row">
        <div class="card mt-2 shadow border-0 rounded-5 p-4" style="background: rgba(255, 255, 255, 0.9);">
            <div class="d-flex align-items-center mb-4">
                <img src="https://th.bing.com/th/id/OIP.Ex3KagXM4zYYfkTWSSXL9AHaHa?w=180&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
                    alt="Avatar" class="rounded-pill border border-3 border-success" style="height: 90px; width: 90px; object-fit: cover;">
                <div class="ms-4">
                    <h1 class="fw-bold mb-0">Huii</h1>
                    <span class="badge bg-success-subtle text-success rounded-pill">Admin</span>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="d-flex flex-column gap-3">
                        
                        <div class="card border-0 border-start border-primary border-5 shadow-sm py-3 px-4">
                            <div class="d-flex align-items-center">
                                <i class="fa-solid fa-envelope fa-xl text-primary me-3"></i>
                                <div>
                                    <small class="text-muted d-block">Email</small>
                                    <strong>hcao84539@gmail.com</strong>
                                </div>
                            </div>
                        </div>

                        <div class="card border-0 border-start border-dark border-5 shadow-sm py-3 px-4">
                            <div class="d-flex align-items-center">
                                <i class="fa-brands fa-github fa-xl text-dark me-3"></i>
                                <div>
                                    <small class="text-muted d-block">Github</small>
                                    <strong>Huii404</strong>
                                </div>
                            </div>
                        </div>

                        <div class="card border-0 border-start border-danger border-5 shadow-sm py-3 px-4">
                            <div class="d-flex align-items-center">
                                <i class="fa-brands fa-tiktok fa-xl text-danger me-3"></i>
                                <div>
                                    <small class="text-muted d-block">TikTok</small>
                                    <strong>Huii404</strong>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card border-0 shadow p-4 h-100 bg-light">
                        <h5 class="fw-bold">Kĩ năng</h5>
                        <div class="d-flex flex-wrap gap-2 mt-3">
                            <span v-for="(skill, index) in skillsList" :key="'s'+index"
                                class="badge rounded-pill bg-white border px-3 py-2 fs-6 text-dark">
                                <i :class="skill.icon" class="me-1 text-primary"></i> {{ skill.name }}
                            </span>
                        </div>

                        <hr class="my-4">

                        <h5 class="fw-bold">Sở thích</h5>
                        <div class="d-flex flex-wrap gap-2 mt-3">
                            <span v-for="(hobby, index) in hobbiesList" :key="'h'+index"
                                class="badge rounded-pill bg-white border px-3 py-2 fs-6 text-dark">
                                <i :class="hobby.icon" class="me-1 text-primary"></i> {{ hobby.name }}
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div v-for="(img, idx) in travelPhotos" :key="idx" class="col-lg-3 col-md-6 mb-3">
                    <div class="card border-0 shadow-sm h-100 rounded-4 overflow-hidden position-relative">
                        <img :src="img.url" class="card-img-top" style="height: 200px; object-fit: cover;" :alt="img.title">
                        <div class="card-img-overlay d-flex align-items-end p-2" style="background: linear-gradient(transparent, rgba(0,0,0,0.7));">
                            <p class="text-white small mb-0 fw-bold">{{ img.title }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        new Vue({
            el: "#app",
            data: {
                skillsList: [
                    { name: 'C++ / C#', icon: 'fa-solid fa-code' },
                    { name: 'Java', icon: 'fa-brands fa-java' },
                    { name: 'VueJS & Bootstrap', icon: 'fa-brands fa-vuejs' },
                ],

                hobbiesList: [
                    { name: 'Tập Gym', icon: 'fa-solid fa-dumbbell' },
                    { name: 'Chụp ảnh', icon: 'fa-solid fa-camera' },
                    { name: 'Đạp xe', icon: 'fa-solid fa-bicycle' },
                    { name: 'Phá máy', icon: 'fa-solid fa-computer' },
                    { name: 'Trekking', icon: 'fa-solid fa-person-hiking' },
                    { name: 'Chill', icon: 'fa-solid fa-mug-hot' }
                ]
            }
        })
    </script>
</body>

</html>
