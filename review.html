<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Memory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><b>Myweb</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="article.html">Article</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="review.html">Review</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" id="app">
        <div class="row">
            <div class="col-lg-2 col-md-12">
                <label for=""class="mt-4"><b>Kiểu ngày</b></label>
                <div class="d-flex justify-content">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" v-model="sapxep" type="radio" name="trangThai" id="radioCu"
                            value="cu" checked>
                        <label class="form-check-label" for="radioCu">Cũ</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" v-model="sapxep" type="radio" name="trangThai" id="radioMoi"
                            value="moi">
                        <label class="form-check-label" for="radioMoi">Mới</label>
                    </div>
                </div>
            </div>

            <div class="col-lg-10 col-md-12">
                <div class="row g-4">
                    <div class="col-lg-3 col-md-12" v-for="(value, index) in locketDaSapXep" :key="index">
                        <div class="card h-100 shadow-sm rounded-4 border-2 overflow-hidden mt-4" >

                            <img :src="value.image" class="card-img-top" alt="locket-img"
                                style="height: 200px; object-fit: cover;">

                            <div class="card-body d-flex flex-column justify-content-between">
                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <span class="badge bg-primary text-white rounded-pill fw-normal">
                                        <i class="fa-regular fa-calendar-days me-1"></i> {{value.date}}
                                    </span>
                                    <button type="button" class="btn btn-outline-primary btn-sm rounded-4"
                                        data-bs-toggle="modal" data-bs-target="#exampleModal">
                                        Open
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Modal -->
                        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                            aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h1 class="modal-title fs-5" id="exampleModalLabel">Memory</h1>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                    </div>
                                    <!-- content -->
                                    <img :src="value.image" class="card-img-top" alt="locket-img"
                                        style="height: 380px;">

                                    <h6 class="text-center fw-bold mb-1 mt-1">{{value.title}}</h6>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary"
                                            data-bs-dismiss="modal">Close</button>
                                        <button type="button" class="btn btn-primary">Save changes</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>


                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
<script>
    new Vue({
        el: "#app",
        data: {
            list: [],
            sapxep: 'cu',
            locket: [
                { title: 'ngay moi', date: '11/11/2022', image: 'https://m.yodycdn.com/blog/meme-ech-xanh-yody-vn-47.jpg' },
                { title: 'ngay moi', date: '12/11/2012', image: 'https://m.yodycdn.com/blog/meme-ech-xanh-yody-vn-47.jpg' },
                { title: 'ngay moi', date: '13/11/2002', image: 'https://m.yodycdn.com/blog/meme-ech-xanh-yody-vn-47.jpg' },
                { title: 'ngay moi', date: '14/11/2023', image: 'https://m.yodycdn.com/blog/meme-ech-xanh-yody-vn-47.jpg' },
                { title: 'ngay moi', date: '15/11/2026', image: 'https://m.yodycdn.com/blog/meme-ech-xanh-yody-vn-47.jpg' },
                { title: 'ngay moi', date: '16/11/2020', image: 'https://m.yodycdn.com/blog/meme-ech-xanh-yody-vn-47.jpg' },
            ]
        },
        methods: {
        },
        computed: {
            locketDaSapXep() {
                let copyList = [...this.locket];

                copyList.sort((a, b) => {
                    let dateA = new Date(a.date.split('/').reverse().join('-'));
                    let dateB = new Date(b.date.split('/').reverse().join('-'));

                    if (this.sapxep === 'cu') {
                        return dateA - dateB;
                    } else {
                        return dateB - dateA;
                    }
                });

                return copyList;
            }
        }
    })
</script>

</html>
