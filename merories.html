<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><b>Myweb</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="article.html">Bài viết</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="merories.html">Memory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" id="app">
        <div class="row">
            <h3 class="text-center"><b><i>Kỉ Niệm</i></b></h3>
            <hr class="mt-3 text-danger">
            <div class="col-lg-3 col-md-12">
                <label for="">Ngày</label>
                <input type="date" class="form-control">
                <label for="" class="mt-3">Kiểu ngày</label>
                <div class="d-flex justify-content">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="trangThai" id="radioCu" value="option1"
                            checked>
                        <label class="form-check-label" for="radioCu">Cũ</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="trangThai" id="radioMoi" value="option2">
                        <label class="form-check-label" for="radioMoi">Mới</label>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="row g-4">
                    <div class="col-lg-3 col-md-6" v-for="(value, index) in locket" :key="index">
                        <div class="card h-100 shadow-sm rounded-4 border-0 overflow-hidden">

                            <img :src="value.image" class="card-img-top" alt="locket-img" style="height: 180px; object-fit: cover;">

                            <div class="card-body d-flex flex-column justify-content-between">
                                <div>
                                    <h6 class="text-dark fw-bold mb-2">{{value.title}}</h6>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <span class="badge bg-primary text-white rounded-pill fw-normal">
                                        <i class="fa-regular fa-calendar-days me-1"></i> {{value.date}}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
<script>
    new Vue({
        el: "#app",
        data: {
            list: [],
            locket: [
                { title: 'ngay moi', date: '11/11/2022', image: 'https://m.yodycdn.com/blog/meme-ech-xanh-yody-vn-47.jpg' },

                { title: 'ngay moi', date: '11/11/2022', image: 'https://m.yodycdn.com/blog/meme-ech-xanh-yody-vn-47.jpg' },
                { title: 'ngay moi', date: '11/11/2022', image: 'https://m.yodycdn.com/blog/meme-ech-xanh-yody-vn-47.jpg' },
            ]
        },
        methods: {

        },
    })
</script>

</html>
